<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin dashboard to view and manage all registered complaints." />
  <title>Complaint Portal — Admin Dashboard</title>
  <script>
    // Simple auth check
    if (localStorage.getItem('adminSession') !== 'true') {
      window.location.href = 'login.html';
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/jspdf-autotable@3.5.25/dist/jspdf.plugin.autotable.js"></script>
  <script>
    // Ensure jsPDF is available globally for plugins and our script
    window.jsPDF = window.jspdf.jsPDF;
  </script>
</head>
<body>
  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="page-wrapper">
    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
      <div class="nav-brand">
        <div class="nav-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
        </div>
        <span>Complaint Portal</span>
      </div>
      <div class="nav-links">
        <a href="index.html" class="nav-link" id="nav-submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Submit
        </a>
        <a href="admin.html" class="nav-link active" id="nav-dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Dashboard
        </a>
        <a href="#" class="nav-link" id="btn-logout" onclick="localStorage.removeItem('adminSession'); window.location.reload();">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </a>
      </div>
    </nav>

    <!-- Header Section -->
    <header class="header" id="page-header">
      <h1>Admin Dashboard</h1>
      <p class="subtitle">View all registered complaints and take action.</p>
    </header>

    <!-- Stats Cards -->
    <section class="stats-row" id="stats-row">
      <div class="stat-card stat-total" id="stat-total">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="count-total">0</span>
          <span class="stat-label">Total</span>
        </div>
      </div>
      <div class="stat-card stat-pending" id="stat-pending">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="count-pending">0</span>
          <span class="stat-label">Pending</span>
        </div>
      </div>
      <div class="stat-card stat-resolved" id="stat-resolved">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="count-resolved">0</span>
          <span class="stat-label">Resolved</span>
        </div>
      </div>
      <div class="stat-card stat-rejected" id="stat-rejected">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="count-rejected">0</span>
          <span class="stat-label">Rejected</span>
        </div>
      </div>
    </section>

    <!-- Filter & Export Bar -->
    <section class="action-bar" id="action-bar">
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
        <button class="filter-btn" data-filter="Pending" id="filter-pending">Pending</button>
        <button class="filter-btn" data-filter="Resolved" id="filter-resolved">Resolved</button>
        <button class="filter-btn" data-filter="Rejected" id="filter-rejected">Rejected</button>
      </div>
      
      <div class="export-actions">
        <button class="export-btn btn-excel" id="export-excel" title="Download as Excel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><line x1="10" y1="9" x2="8" y2="9"></line></svg>
          <span>Excel</span>
        </button>
        <button class="export-btn btn-pdf" id="export-pdf" title="Download as PDF">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M16 13H8"></path><path d="M16 17H8"></path><path d="M10 9H8"></path></svg>
          <span>PDF</span>
        </button>
      </div>
    </section>

    <!-- Complaints List -->
    <section class="complaints-list" id="complaints-list">
      <!-- Complaint cards will be injected here by JS -->
    </section>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
      <h2>No complaints found</h2>
      <p>Complaints submitted through the form will appear here.</p>
      <a href="index.html" class="empty-cta">Submit a Complaint</a>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      <span id="toast-message">Action completed!</span>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
